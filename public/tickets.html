<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Tickets — Compass</title>
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--ink);
      margin-bottom: 18px;
      gap: 16px;
    }
    .tab {
      padding: 8px 0;
      cursor: pointer;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      color: var(--ink-soft);
      border-bottom: 4px solid transparent;
      margin-bottom: -1px;
      text-transform: uppercase;
    }
    .tab.active {
      color: var(--ink);
      border-bottom-color: var(--signal);
    }
    .ticket-list {
      display: flex;
      flex-direction: column;
      gap: 0;
      border: 1px solid var(--ink);
      overflow: hidden;
      background-color: var(--paper-bright);
      box-shadow: 7px 7px 0 var(--ink);
    }
    .ticket-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      text-decoration: none;
      color: inherit;
      transition: background-color 0.15s ease;
    }
    .ticket-row:last-child {
      border-bottom: none;
    }
    .ticket-row:hover {
      background-color: rgba(185, 229, 220, .35);
    }
    .ticket-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .ticket-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--ink);
    }
    .ticket-meta {
      font-size: 12px;
      color: var(--ink-soft);
      font-family: var(--mono);
    }
  </style>
  <script src="/js/theme.js"></script>
</head>
<body>
  <header class="header">
    <div class="header-left">
      <a href="/" class="header-logo">⊙ Compass</a>
      <nav class="header-nav">
        <a href="/submit.html">Submit Ticket</a>
        <a href="/tickets.html" class="active">Browse Tickets</a>
        <a href="/dashboard.html">Dashboard</a>
        <a href="/wiki">Wiki</a>
        <a href="/slang">Slang</a>
        <a href="/flags">Flagged Words</a>
      </nav>
    </div>
    <div class="header-right">
      <button id="theme-toggle" class="btn btn-sm" aria-label="Toggle theme" style="padding: 4px 8px; line-height: 1;">
        <span class="theme-toggle-icon" aria-hidden="true">☾</span>
      </button>
    </div>
  </header>

  <main class="container" style="max-width: 800px;">
    <div class="page-heading">
      <h1>Support Tickets</h1>
      <p class="subtitle" style="color: var(--color-fg-muted); margin-top: 4px;">Browse and track support requests submitted by players.</p>
    </div>

    <div id="ticket-flash" class="flash" role="status"></div>

    <!-- Tabs for Filtering -->
    <div class="tabs">
      <div class="tab active" id="tab-open">Open Tickets (0)</div>
      <div class="tab" id="tab-closed">Closed Tickets (0)</div>
    </div>

    <!-- Ticket List Container -->
    <div id="tickets-container" class="ticket-list">
      <div style="padding: 24px; text-align: center; color: var(--color-fg-muted);">
        Loading tickets...
      </div>
    </div>
  </main>

  <script src="/js/tickets.js"></script>
</body>
</html>
