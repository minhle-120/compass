<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compass — Game Support Agent</title>
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    .hero {
      width: min(1080px, 100%);
      margin: 0 auto;
      padding: clamp(56px, 9vw, 120px) clamp(18px, 4vw, 52px) 80px;
      border-bottom: 1px solid var(--ink);
    }
    .hero h1 {
      max-width: 720px;
      margin: 0 0 18px;
      font-family: var(--display);
      font-size: clamp(64px, 11vw, 122px);
      font-weight: 500;
      line-height: .86;
      letter-spacing: -.055em;
    }
    .hero p {
      max-width: 590px;
      margin: 0 0 28px;
      color: var(--ink-soft);
      font-size: 17px;
      line-height: 1.75;
    }
    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }
    .hero-actions .btn {
      padding: 10px 24px;
    }
  </style>
  <script src="/js/theme.js"></script>
</head>
<body>
  <header class="header">
    <div class="header-left">
      <a href="/" class="header-logo">⊙ Compass</a>
      <nav class="header-nav">
        <a href="/submit.html">Submit Ticket</a>
        <a href="/tickets.html">Browse Tickets</a>
        <a href="/dashboard.html">Dashboard</a>
        <a href="/wiki">Wiki</a>
        <a href="/flags">Flagged Words</a>
      </nav>
    </div>
    <div class="header-right">
      <button id="theme-toggle" class="btn btn-sm" aria-label="Toggle theme" style="padding: 4px 8px; line-height: 1;">
        <span class="theme-toggle-icon" aria-hidden="true">☾</span>
      </button>
    </div>
  </header>

  <section class="hero">
    <h1>Compass</h1>
    <p>AI-powered game support agent. Automatically triages, classifies, and resolves player tickets using a ReAct loop with tool-calling.</p>
    <div class="hero-actions">
      <a href="/submit.html" class="btn btn-primary">Submit a Ticket</a>
      <a href="/dashboard.html" class="btn">Open Dashboard</a>
    </div>
  </section>

  <!-- Features section removed -->
</body>
</html>
