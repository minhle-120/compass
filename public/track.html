<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Track Ticket — Compass</title>
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    .timeline {
      margin-top: 24px;
      position: relative;
    }
    .timeline::before {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      left: 20px;
      width: 2px;
      background-color: var(--color-border);
      z-index: 1;
    }
    .timeline-item {
      display: flex;
      margin-bottom: 24px;
      position: relative;
      z-index: 2;
    }
    .timeline-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background-color: var(--color-bg-subtle);
      border: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      margin-right: 16px;
      flex-shrink: 0;
      font-size: 14px;
      color: var(--color-fg-muted);
    }
    .timeline-content {
      flex-grow: 1;
      border: 1px solid var(--color-border);
      border-radius: 6px;
      background-color: var(--color-bg);
      overflow: hidden;
    }
    .timeline-header {
      background-color: var(--color-bg-subtle);
      padding: 8px 16px;
      border-bottom: 1px solid var(--color-border);
      font-size: 13px;
      display: flex;
      justify-content: space-between;
      color: var(--color-fg-muted);
    }
    .timeline-body {
      padding: 16px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
    }
    .timeline-item.agent .timeline-avatar {
      background-color: #2da44e;
      color: #ffffff;
      border-color: #2da44e;
    }
    .timeline-item.agent .timeline-content {
      border-color: rgba(45, 164, 78, 0.4);
    }
    .timeline-item.agent .timeline-header {
      background-color: rgba(45, 164, 78, 0.05);
      border-bottom-color: rgba(45, 164, 78, 0.2);
    }
    .status-badge {
      display: inline-flex;
      align-items: center;
      font-size: 12px;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 12px;
      text-transform: capitalize;
    }
    .status-pending { background-color: var(--color-bg-subtle); color: var(--color-fg-muted); border: 1px solid var(--color-border); }
    .status-running { background-color: #ddf4ff; color: #0969da; border: 1px solid rgba(9, 105, 218, 0.2); }
    .status-completed { background-color: #dafbe1; color: #1a7f37; border: 1px solid rgba(26, 127, 55, 0.2); }
    .status-escalated { background-color: #fbe5ff; color: #8250df; border: 1px solid rgba(130, 80, 223, 0.2); }
    .status-failed { background-color: #ffebe9; color: #cf222e; border: 1px solid rgba(207, 34, 46, 0.2); }
    .status-resolved { background-color: #dafbe1; color: #1a7f37; border: 1px solid rgba(26, 127, 55, 0.2); }
    .status-needs_clarification { background-color: #fff8c5; color: #9a6700; border: 1px solid rgba(154, 103, 0, 0.2); }
    .status-rejected { background-color: #ffebe9; color: #cf222e; border: 1px solid rgba(207, 34, 46, 0.2); }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-left">
      <a href="/" class="header-logo">⊙ Compass</a>
      <nav class="header-nav">
        <a href="/submit.html">Submit Ticket</a>
        <a href="/dashboard.html">Dashboard</a>
      </nav>
    </div>
  </header>

  <main class="container" style="max-width: 800px;">
    <div id="loading" style="padding: 40px; text-align: center; color: var(--color-fg-muted);">
      Loading ticket details...
    </div>

    <!-- Lookup Form when no ID is provided -->
    <div id="lookup-view" style="display: none; max-width: 480px; margin: 40px auto;" class="box">
      <div class="box-header">Track Ticket Conversation</div>
      <div class="box-body">
        <form id="lookup-form">
          <div class="form-group">
            <label for="lookup-id">Ticket ID</label>
            <input type="text" id="lookup-id" class="form-control" placeholder="e.g. T-1718035123-5813" required>
          </div>
          <button type="submit" class="btn btn-primary mt-2" style="width: 100%;">Track Ticket</button>
        </form>
      </div>
    </div>

    <div id="error-view" style="display: none; padding: 40px; text-align: center;">
      <h2 style="color: var(--color-fg-danger);">Ticket Not Found</h2>
      <p style="color: var(--color-fg-muted); margin-top: 8px;">Please verify your Ticket ID or submit a new ticket.</p>
      <div class="mt-4" style="display: flex; justify-content: center; gap: 8px;">
        <a href="/track.html" class="btn">Back to Track</a>
        <a href="/submit.html" class="btn btn-primary">Submit New Ticket</a>
      </div>
    </div>

    <div id="ticket-view" style="display: none;">
      <div style="border-bottom: 1px solid var(--color-border); padding-bottom: 16px; margin-bottom: 24px;">
        <div style="display: flex; justify-content: space-between; align-items: flex-start; gap: 16px;">
          <h1 id="ticket-title" style="font-size: 24px; font-weight: 600;">Ticket Subject</h1>
          <div style="display: flex; align-items: center; gap: 8px; flex-shrink: 0;">
            <span id="ticket-resolution" class="status-badge" style="display: none;"></span>
            <span id="ticket-status" class="status-badge">pending</span>
          </div>
        </div>
        <div style="margin-top: 8px; color: var(--color-fg-muted); font-size: 14px;">
          Ticket ID: <strong id="ticket-id-display" style="font-family: var(--font-mono); color: var(--color-fg-default);">T-1234</strong>
          <span style="margin: 0 8px;">•</span>
          Created <span id="ticket-created">date</span>
        </div>
      </div>

      <div class="timeline" id="conversation-timeline">
        <!-- Message items dynamically populated -->
      </div>

      <div class="box mt-4" id="reply-box">
        <div class="box-header">Add a reply</div>
        <div class="box-body">
          <form id="reply-form">
            <div class="form-group">
              <textarea id="reply-message" class="form-control" rows="4" placeholder="Type your reply here..." required></textarea>
            </div>
            <div style="display: flex; justify-content: flex-end; margin-top: 12px;">
              <button type="submit" id="reply-btn" class="btn btn-primary">Send Reply</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </main>

  <script src="/js/track.js"></script>
</body>
</html>
