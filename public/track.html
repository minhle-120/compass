<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Track Ticket — Compass</title>
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    .ticket-timeline {
      margin-top: 24px;
      position: relative;
    }
    .ticket-timeline::before {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      left: 20px;
      width: 2px;
      background-color: var(--line);
      z-index: 1;
    }
    .ticket-timeline-item {
      display: flex;
      margin-bottom: 24px;
      position: relative;
      z-index: 2;
    }
    .ticket-timeline-avatar {
      width: 40px;
      height: 40px;
      background-color: var(--paper-bright);
      border: 1px solid var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      font-weight: 600;
      margin-right: 16px;
      flex-shrink: 0;
      font-size: 14px;
      color: var(--ink-soft);
    }
    .ticket-timeline-content {
      flex-grow: 1;
      border: 1px solid var(--ink);
      background-color: var(--paper-bright);
      overflow: hidden;
    }
    .ticket-timeline-header {
      background-color: var(--paper);
      padding: 8px 16px;
      border-bottom: 1px solid var(--ink);
      font-family: var(--mono);
      font-size: 13px;
      display: flex;
      justify-content: space-between;
      color: var(--ink-soft);
    }
    .ticket-timeline-body {
      padding: 16px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
    }
    .ticket-timeline-item.agent .ticket-timeline-avatar {
      background-color: var(--aqua);
      color: var(--ink);
      border-color: var(--ink);
    }
    .ticket-timeline-item.agent .ticket-timeline-content {
      border-color: var(--ink);
    }
    .ticket-timeline-item.agent .ticket-timeline-header {
      background-color: rgba(185, 229, 220, .35);
    }
    .ticket-timeline-item.ai-working {
      margin-top: -8px;
    }
    .ticket-timeline-item.ai-working .ticket-timeline-content {
      border-color: var(--line);
    }
    .ai-working-body {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      color: var(--ink-soft);
      font-family: var(--mono);
      font-size: 13px;
    }
    .ai-working-spinner {
      width: 16px;
      height: 16px;
      box-sizing: border-box;
      border: 2px solid var(--line);
      border-top-color: var(--ink);
      border-radius: 50%;
      animation: ai-working-spin .8s linear infinite;
      flex-shrink: 0;
    }
    @keyframes ai-working-spin {
      to { transform: rotate(360deg); }
    }
    @media (prefers-reduced-motion: reduce) {
      .ai-working-spinner { animation: none; }
    }
    .ticket-media-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
      padding: 0 16px 16px;
    }
    .ticket-media-item {
      margin: 0;
      min-width: 0;
    }
    .ticket-media-item img,
    .ticket-media-item video {
      display: block;
      width: 100%;
      max-height: 320px;
      object-fit: contain;
      background: var(--paper);
      border: 1px solid var(--line);
    }
    .ticket-media-item figcaption {
      margin-top: 5px;
      overflow-wrap: anywhere;
      color: var(--ink-soft);
      font-family: var(--mono);
      font-size: 12px;
    }
  </style>
  <script src="/js/theme.js"></script>
</head>
<body>
  <header class="header">
    <div class="header-left">
      <a href="/" class="header-logo">⊙ Compass</a>
      <nav class="header-nav">
        <a href="/submit.html">Submit Ticket</a>
        <a href="/tickets.html">Browse Tickets</a>
        <a href="/dashboard.html">Dashboard</a>
        <a href="/wiki">Wiki</a>
        <a href="/flags">Flagged Words</a>
      </nav>
    </div>
    <div class="header-right">
      <button id="theme-toggle" class="btn btn-sm" aria-label="Toggle theme" style="padding: 4px 8px; line-height: 1;">
        <span class="theme-toggle-icon" aria-hidden="true">☾</span>
      </button>
    </div>
  </header>

  <main class="container" style="max-width: 800px;">
    <div id="loading" style="padding: 40px; text-align: center; color: var(--color-fg-muted);">
      Loading ticket details...
    </div>

    <!-- Lookup Form when no ID is provided -->
    <div id="lookup-view" style="display: none; max-width: 480px; margin: 40px auto;" class="box">
      <div class="box-header">Track Ticket Conversation</div>
      <div class="box-body">
        <form id="lookup-form">
          <div class="form-group">
            <label for="lookup-id">Ticket ID</label>
            <input type="text" id="lookup-id" class="form-control" placeholder="e.g. T-1718035123-5813" required>
          </div>
          <button type="submit" class="btn btn-primary mt-2" style="width: 100%;">Track Ticket</button>
        </form>
      </div>
    </div>

    <div id="error-view" style="display: none; padding: 40px; text-align: center;">
      <h2 style="color: var(--color-fg-danger);">Ticket Not Found</h2>
      <p style="color: var(--color-fg-muted); margin-top: 8px;">Please verify your Ticket ID or submit a new ticket.</p>
      <div class="mt-4" style="display: flex; justify-content: center; gap: 8px;">
        <a href="/track.html" class="btn">Back to Track</a>
        <a href="/submit.html" class="btn btn-primary">Submit New Ticket</a>
      </div>
    </div>

    <div id="ticket-view" style="display: none;">
      <div style="border-bottom: 1px solid var(--color-border); padding-bottom: 16px; margin-bottom: 24px;">
        <div style="display: flex; justify-content: space-between; align-items: flex-start; gap: 16px;">
          <h1 id="ticket-title" style="font-size: 24px; font-weight: 600;">Ticket Subject</h1>
          <div style="display: flex; align-items: center; gap: 8px; flex-shrink: 0;">
            <button id="close-ticket-btn" class="btn btn-sm" type="button" style="display: none;">Close ticket</button>
            <button id="delete-ticket-btn" class="btn btn-danger btn-sm" type="button" style="display: none;">Delete ticket</button>
            <span id="ticket-resolution" class="status-badge" style="display: none;"></span>
            <span id="ticket-status" class="status-badge">pending</span>
          </div>
        </div>
        <div style="margin-top: 8px; color: var(--color-fg-muted); font-size: 14px;">
          Ticket ID: <strong id="ticket-id-display" style="font-family: var(--font-mono); color: var(--color-fg-default);">T-1234</strong>
          <span style="margin: 0 8px;">•</span>
          Created <span id="ticket-created">date</span>
        </div>
      </div>

      <div class="ticket-timeline" id="conversation-timeline">
        <!-- Message items dynamically populated -->
      </div>

      <div class="box mt-4" id="reply-box">
        <div class="box-header">Add a reply</div>
        <div class="box-body">
          <form id="reply-form">
            <div class="form-group">
              <textarea id="reply-message" class="form-control" rows="4" placeholder="Type your reply here..." required></textarea>
            </div>
            <div style="display: flex; justify-content: flex-end; margin-top: 12px;">
              <button type="submit" id="reply-btn" class="btn btn-primary">Send Reply</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </main>

  <script src="/js/track.js"></script>
</body>
</html>
